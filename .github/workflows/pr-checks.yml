name: Pull request checks

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semantic-pr-title:
    name: semantic PR title
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          SEMANTIC_TITLE_PATTERN='^(feat|fix|refactor|perf|docs|test|build|ci|release|chore)\([^)]+\): .+'
          if [[ ! "$PR_TITLE" =~ $SEMANTIC_TITLE_PATTERN ]]; then
            printf 'Expected semantic commit title format <type>(<scope>): <short summary>. Got %s\n' "$PR_TITLE"
            exit 1
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  coverage:
    name: test with coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run coverage
